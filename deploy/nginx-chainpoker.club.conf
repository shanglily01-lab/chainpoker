server {
    listen 80;
    listen [::]:80;
    server_name chainpoker.club www.chainpoker.club;

    root /var/www/chainpoker.club;
    index index.html;

    access_log /var/log/nginx/chainpoker.club.access.log;
    error_log /var/log/nginx/chainpoker.club.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }
}
