<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChainPoker Advertising Card</title>
    <link rel="stylesheet" href="./ad-card.css" />
  </head>
  <body>
    <main class="page">
      <section class="card-sheet" aria-label="ChainPoker 扑克牌广告牌设计">
        <article class="promo-card">
          <div class="corner top-left">♤</div>
          <div class="corner bottom-right">♤</div>
          <div class="ornament"></div>
          <div class="brand">
            <span class="brand-mark">♤</span>
            <span>chainpoker</span>
          </div>
          <div class="message">
            <p class="kicker">今晚开局</p>
            <h1>扫码约牌友</h1>
            <p>找同城牌局 · 组朋友桌 · 发现新玩法</p>
          </div>
          <div class="qr-panel">
            <img src="./assets/chainpoker-io-qr.png" alt="QR code linking to chainpoker.io" />
            <span>chainpoker.io</span>
          </div>
        </article>

        <aside class="notes">
          <p>广告语：<strong>今晚开局，扫码约牌友</strong></p>
          <p>建议作为每副牌里的额外广告牌、说明牌或 Joker 替换卡使用。</p>
        </aside>
      </section>
    </main>
  </body>
</html>
